<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Phigros Ability Test</title>
    <link rel="stylesheet" href="css/styles.css" />
</head>

<body class="w-full text-gray-800">
    <header class="p-4 text-center bg-blue-300 mb-4">
        <h1 class="text-4xl font-bold">Phigros Ability Test</h1>
    </header>
    <main class="w-5/6 mx-auto mt-8">
        <form id="cal-ability">
            <div class="flex justify-between items-center">
                <h2 class="font-bold text-base md:text-3xl">Select Difficulty</h2>
                <div class="relative">
                    <select
                        class="block appearance-none bg-gray-200 border border-gray-200 text-gray-700 py-3 px-4
                        rounded leading-tight cursor-pointer focus:outline-none focus:bg-gray-100 focus:border-gray-500 transition ease-out duration-300"
                        id="select-difficulty" name="difficulty">
                        <option selected hidden>Choose here</option>
                        <option value="0">皆傳</option>
                        <option value="1">中傳</option>
                        <option value="2">十段</option>
                        <option value="3">九段</option>
                        <!-- <option value="4">八段</option> -->
                    </select>
                </div>
            </div>
            <div class="bg-gray-100 mt-5 p-4 hidden flex-col" id="main-show">
                <!-- Song card -->
                <div class="rounded overflow-hidden shadow-lg mb-8">
                    <img class="w-full" id="song-img" src="" alt="Not Implemented Yet" />
                    <div class="flex items-center">
                        <h2 class="font-bold text-2xl pl-2" id="song-name"></h2>
                    </div>
                    <div class="flex items-center">
                        <h2 class="font-bold text-2xl pl-2" id="song-level"></h2>
                    </div>
                    <div class="flex items-center">
                        <h2 class="font-bold text-base md:text-2xl pl-2">Remaining Life :</h2>
                        <h3 class="font-bold text-base md:text-2xl pl-2" id="current-life"></h3>
                    </div>
                </div>
                <!-- End here -->
                <!-- Input datas -->
                <div class="rounded overflow-hidden shadow-lg p-4">
                    <h3 class="mt-4 mb-3 font-bold text-2xl">Input Datas</h3>
                    <div class="mb-3 lg:flex lg:items-center lg:justify-between">
                        <h4 class="pr-5 font-bold">Great:</h4>
                        <input class="input-num" id="great-val" type="number" placeholder="The number of great notes" />
                    </div>
                    <div class="mb-3 lg:flex lg:items-center lg:justify-between">
                        <h4 class="pr-5">Bad:</h4>
                        <input class="input-num" id="bad-val" type="number" placeholder="The number of bad notes" />
                    </div>
                    <div class="mb-3 lg:flex lg:items-center lg:justify-between">
                        <h4 class="pr-5">Miss:</h4>
                        <input class="input-num" id="miss-val" type="number" placeholder="The number of miss notes" />
                    </div>
                    <input class="btn hover:bg-blue-400 transition ease-out duration-300" type="submit"
                        value="Submit" />
                </div>
            </div>
        </form>
    </main>
    <script type="module" src="js/main.js"></script>
</body>

</html>
