<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Phigros Ability Test</title>
    <link rel="stylesheet" href="css/styles.css" />
</head>

<body class="w-full">
    <header class="p-4 text-center bg-blue-300 mb-4">
        <h1 class="text-4xl font-bold">Phigros Ability Test</h1>
    </header>
    <main class="m-12">
        <form id="cal-ability">
            <div class="flex justify-between">
                <h2 class="font-bold text-2xl">Select Difficulty</h2>
                <select id="select-difficulty" name="difficulty">
                    <option selected hidden>Choose here</option>
                    <option value="0">皆傳</option>
                    <option value="1">中傳</option>
                    <option value="2">十段</option>
                    <option value="3">九段</option>
                    <!-- <option value="4">八段</option> -->
                </select>
            </div>
            <div class="hidden" id="main-show">
                <div class="flex items-center">
                    <h2 class="font-bold text-2xl">Song Name :</h2>
                    <h3 class="font-bold text-2xl pl-2" id="song-name"></h3>
                </div>
                <img id="song-img" src="" alt="Not Implemented Yet" />
                <div class="flex items-center">
                    <h2 class="font-bold text-2xl">Remaining Life :</h2>
                    <h3 class="font-bold text-2xl pl-2" id="current-life"></h3>
                </div>
                <div class="container">
                    <h3>Input Datas</h3>
                    <div class="data-collect">
                        <h4>Great:</h4>
                        <input id="great-val" type="number" placeholder="The number of great notes" />
                    </div>
                    <div class="data-collect">
                        <h4>Bad:</h4>
                        <input id="bad-val" type="number" placeholder="The number of bad notes" />
                    </div>
                    <div class="data-collect">
                        <h4>Miss:</h4>
                        <input id="miss-val" type="number" placeholder="The number of miss notes" />
                    </div>
                </div>
                <input type="submit" value="Submit" />
            </div>
        </form>
    </main>
    <script type="module" src="js/main.js"></script>
</body>

</html>
